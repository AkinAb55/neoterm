name: Build NeoTerm

# Manuálisan indítható build + release. A GitHub UI-on: Actions →
# "Build NeoTerm" → Run workflow. Lefordítja a proot binárist, beágyazva
# (libproot.so) lebuildeli az APK-t, legyártja a disztró-rootfs-eket, majd
# mindezt egyetlen GitHub Release-be tölti fel — innen tölti a setup-képernyő
# a kiválasztott rootfs-t.
on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "APK build típus"
        type: choice
        default: debug
        options:
          - debug
          - release
      distros:
        description: "release-be kerülő rootfs disztrók (szóközzel)"
        type: string
        default: "ubuntu alpine kali arch"
      release_tag:
        description: "GitHub Release tag (üresen hagyva a versionName-ből generálódik: v<versionName>)"
        type: string
        default: ""
      publish_release:
        description: "GitHub Release közzététele (APK + proot + rootfs)"
        type: boolean
        default: true

env:
  NDK_VERSION: "26.1.10909125"
  CMAKE_VERSION: "3.22.1"

jobs:
  # ── 1) proot bináris — ebből függ az APK ────────────────────────────────
  build-proot:
    name: proot binary (aarch64)
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Install host build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils-aarch64-linux-gnu xxd make curl xz-utils zstd file

      # A modern Android cmdline-tools JDK 17-et igényel a sdkmanagerhez.
      - name: Set up JDK 17 (Android SDK tooling)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager "ndk;${NDK_VERSION}"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Build proot
        run: |
          chmod +x proot/build-proot.sh
          ./proot/build-proot.sh "${GITHUB_WORKSPACE}/out/proot/aarch64"

      - name: Upload proot binary
        uses: actions/upload-artifact@v4
        with:
          name: proot-aarch64
          path: out/proot/aarch64/proot
          if-no-files-found: error

  # ── 2) NeoTerm APK (a proot binárist beágyazva) ─────────────────────────
  build-apk:
    name: APK (${{ inputs.build_type }})
    needs: build-proot
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          # The embedded Termux:X11 X server (:x11 module) lives in the
          # third_party/termux-x11 submodule, whose own native deps (xorgproto,
          # pixman, xserver, libxcb…) are nested submodules — recurse, or the
          # CMake configure fails (e.g. missing xorgproto/include/X11/Xpoll.h.in).
          submodules: recursive

      # A natív Xorg-build (xserver/pixman/…) host-oldali eszközei.
      - name: Install native X11 build host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends bison python3 patch

      # JDK 17 az Android SDK/NDK telepítő eszközökhöz (sdkmanager)…
      - name: Set up JDK 17 (Android SDK tooling)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + CMake
        run: |
          sdkmanager "ndk;${NDK_VERSION}" "cmake;${CMAKE_VERSION}" \
                     "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      # AGP 8 / Gradle 8 a tényleges Gradle buildhez JDK 17-et igényel.
      - name: Set up JDK 17 (Gradle build)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Fetch proot binary
        uses: actions/download-artifact@v4
        with:
          name: proot-aarch64
          path: ${{ github.workspace }}/proot-bin

      - name: Bundle proot into APK (libproot.so)
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          cp "${GITHUB_WORKSPACE}/proot-bin/proot" \
             app/src/main/jniLibs/arm64-v8a/libproot.so
          chmod +x app/src/main/jniLibs/arm64-v8a/libproot.so
          ls -l app/src/main/jniLibs/arm64-v8a/

      - name: Bump version automatically (per build)
        run: |
          # Append the workflow run number to versionName and add it to
          # versionCode, so every build produces a strictly newer version that
          # the in-app updater will pick up. Patched in CI only (not committed).
          RUN="${{ github.run_number }}"
          BASE_NAME="$(sed -nE 's/.*versionName[[:space:]]*"([^"]+)".*/\1/p' app/build.gradle | head -n1)"
          BASE_CODE="$(sed -nE 's/.*versionCode[[:space:]]+([0-9]+).*/\1/p' app/build.gradle | head -n1)"
          NEW_NAME="${BASE_NAME}.${RUN}"
          NEW_CODE="$(( BASE_CODE + RUN ))"
          sed -i -E "s/(versionName[[:space:]]*\")[^\"]+(\")/\1${NEW_NAME}\2/" app/build.gradle
          sed -i -E "s/(versionCode[[:space:]]+)[0-9]+/\1${NEW_CODE}/" app/build.gradle
          echo "App version: ${NEW_NAME} (versionCode ${NEW_CODE})"
          grep -E "versionName|versionCode" app/build.gradle

      - name: Gradle assemble
        run: |
          chmod +x ./gradlew
          if [ "${{ inputs.build_type }}" = "release" ]; then
            ./gradlew :app:assembleRelease --stacktrace
          else
            ./gradlew :app:assembleDebug --stacktrace
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: neoterm-${{ inputs.build_type }}-apk
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error

  # ── 3) disztró-rootfs-ek ────────────────────────────────────────────────
  fetch-rootfs:
    name: rootfs tarballs
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends curl xz-utils zstd tar coreutils

      - name: Fetch + repack rootfs
        run: |
          chmod +x proot/fetch-rootfs.sh
          ./proot/fetch-rootfs.sh "${GITHUB_WORKSPACE}/out" ${{ inputs.distros }} --arch aarch64

      - name: Upload rootfs
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-aarch64
          path: out/rootfs/**
          if-no-files-found: error

  # ── 4) GitHub Release: APK (X11 beágyazva) + proot + rootfs-ek ──────────
  release:
    name: Publish GitHub Release
    # Akkor is fusson, ha a fetch-rootfs elbukott — a release-be ekkor legalább
    # az APK + proot bekerül, a rootfs-ek pedig amik elkészültek. Csak az
    # APK/proot sikere kötelező.
    if: ${{ always() && inputs.publish_release && needs.build-apk.result == 'success' && needs.build-proot.result == 'success' }}
    needs: [build-apk, build-proot, fetch-rootfs]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release assets (flat names the app expects)
        run: |
          mkdir -p assets
          # proot bináris → proot-aarch64
          cp artifacts/proot-aarch64/proot assets/proot-aarch64
          # APK(ok)
          find artifacts -name '*.apk' -exec cp {} assets/ \;
          # rootfs (upstream-tükör, disztrónként eltérő tömörítés):
          #   artifacts/rootfs-aarch64/<distro>/aarch64.<ext>[.sha256]
          #     → rootfs-<distro>-aarch64.<ext>[.sha256]
          if [ -d artifacts/rootfs-aarch64 ]; then
            for dir in artifacts/rootfs-aarch64/*/; do
              distro="$(basename "${dir}")"
              for f in "${dir}"aarch64.*; do
                [ -f "${f}" ] || continue
                cp "${f}" "assets/rootfs-${distro}-$(basename "${f}")"
              done
            done
          fi
          echo "── release assets ──"
          ls -lh assets

      - name: Determine release tag
        id: tag
        run: |
          TAG="${{ inputs.release_tag }}"
          if [ -z "$TAG" ]; then
            # Match the auto-bumped APK version: <versionName>.<run_number>.
            VERSION="$(sed -nE 's/.*versionName[[:space:]]*"([^"]+)".*/\1/p' app/build.gradle | head -n1)"
            if [ -z "$VERSION" ]; then
              echo "Could not read versionName from app/build.gradle" >&2
              exit 1
            fi
            TAG="v${VERSION}.${{ github.run_number }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${TAG}"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "NeoTerm proot ($TAG)" \
              --notes "proot-alapú NeoTerm. Tartalom: APK, proot bináris (aarch64) és a disztró-rootfs-ek (Ubuntu/Alpine/Kali/Arch). A setup-képernyő ezekből tölti a kiválasztott rootfs-t." \
              --latest
          fi
          gh release upload "$TAG" assets/* --clobber
